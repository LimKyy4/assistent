version: '3.8'

services:
  bot:
    build: .
    container_name: kyy-bot
    restart: unless-stopped
    volumes:
      - ./auth_info_baileys:/app/auth_info_baileys
    env_file:
      - .env
    ports:
      - "3001:3001"

  # Dashboard (Next.js standalone)
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: kyy-dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001/api
